{{define "content"}}
{{with .Data}}
{{if .Err}}<div class="error-banner">{{.Err}}</div>{{end}}
<form class="filter-bar" method="get" action="{{.BasePath}}">
<input type="search" name="q" placeholder="Search keyword or excerpt" value="{{.Filter.Search}}">
<select name="severity">
<option value="">All severities</option>
<option value="info"{{if eq .Filter.Severity "info"}} selected{{end}}>info</option>
<option value="warn"{{if eq .Filter.Severity "warn"}} selected{{end}}>warn</option>
<option value="critical"{{if eq .Filter.Severity "critical"}} selected{{end}}>critical</option>
</select>
<select name="sort" title="Sort order">
<option value=""{{if ne .Filter.Sort "risk"}} selected{{end}}>Newest first</option>
<option value="risk"{{if eq .Filter.Sort "risk"}} selected{{end}}>Highest risk first</option>
</select>
<select name="minrisk" title="Minimum risk score">
<option value="0"{{if eq .Filter.MinRisk 0}} selected{{end}}>Any risk</option>
<option value="40"{{if eq .Filter.MinRisk 40}} selected{{end}}>Risk &ge; 40</option>
<option value="70"{{if eq .Filter.MinRisk 70}} selected{{end}}>Risk &ge; 70</option>
</select>
{{range .Sources}}
<label><input type="checkbox" name="source" value="{{.Name}}"{{if .Checked}} checked{{end}}> {{.Name}}</label>
{{end}}
{{if .Poll}}<input type="hidden" name="poll" value="on">{{end}}
<button class="btn btn-primary" type="submit">Filter</button>
<button class="btn" type="button" title="Reload the current view"
hx-get="{{.RefreshURL}}" hx-target="#main" hx-select="#main" hx-swap="outerHTML">{{icon "refresh"}} Refresh</button>
<button class="btn{{if .Poll}} on{{end}}" type="button"
title="{{if .Poll}}Auto-refresh is on (every 30s){{else}}Auto-refresh every 30s{{end}}"
hx-get="{{.PollURL}}" hx-target="#main" hx-select="#main" hx-swap="outerHTML">{{icon "refresh"}} Auto-refresh: {{if .Poll}}on{{else}}off{{end}}</button>
</form>
{{if .Poll}}
<span class="poll-tick" hx-get="{{.RefreshURL}}" hx-trigger="every 30s"
hx-target="#main" hx-select="#main" hx-swap="outerHTML"></span>
{{end}}
{{template "findings_table" .Findings}}
<div id="finding-panel"></div>
<div class="pagination">
{{if .HasPrev}}<a class="btn btn-sm" href="{{.PrevURL}}">Previous</a>{{end}}
<span class="muted">Page {{.Page}} of {{.TotalPages}} · {{.Total}} total</span>
{{if .HasNext}}<a class="btn btn-sm" href="{{.NextURL}}">Next</a>{{end}}
</div>
{{end}}
{{end}}
